base_config: experiments/configs/badnets.yaml

sweep:
  poison_rate:
    values: [0.01, 0.05, 0.10, 0.20]
    fixed:
      trigger_size: 3
      target_class: 14
      attack: badnets

  trigger_size:
    values: [2, 3, 5, 7]
    fixed:
      poison_rate: 0.10
      target_class: 14
      attack: badnets

  target_class:
    values: [0, 14, 33]
    fixed:
      trigger_size: 3
      poison_rate: 0.10
      attack: badnets

  alpha:
    values: [0.05, 0.10, 0.15, 0.20, 0.30]
    fixed:
      poison_rate: 0.10
      target_class: 14
      attack: blended

defenses:
  - fine_pruning
  - activation_clustering
  - spectral_signatures
  - neural_cleanse

seed: 42
device: cuda
checkpoint_dir: checkpoints
results_dir: results
